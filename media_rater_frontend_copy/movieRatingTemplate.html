<!DOCTYPE html>

<html>

    <head>
        <title>Simple Movie Review Form Template</title>
        <meta name="author" content= "Junshin Purganan">
    </head>

    <!-- TODO: 
     Add database connections: 
        - select from list of movies
        - use the TMDB database from backend connection
     better rating system: slider implementation,
     formatting (css later)
     -->
    <body>
        <!--TODO: 
        Change class to className after switching to REACT formatting-->

        <div>
            <form class="movie-form">
            <h2>Movie Review Form</h2>
        </div>
        
        <hr>

        <div>
            <label>Movie Title:</label>
            <input type="text" placeholder="Enter Title">
        </div>

        <hr>
        
        <div>
            <label>What would you rate this movie?</label>
            <input type="number" min="1" max="5">
        </div>

        <hr>
        
        <div>
            <label>Any Comments?</label>
            <textarea placeholder="What did you think?"></textarea>
        </div>

        <hr>
        <div>
            <button type="submit">Save Movie</button>   
        </div>
    </form>
    </body>
</html>
