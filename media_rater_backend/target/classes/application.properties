# DataSource Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/media_rater
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=${POSTGRES_PASSWORD}

# JPA / Hibernate 7 Configuration (No platform overrides needed!)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# External API Integrations
tmdb.api.key=${TMDB_API_KEY}
tmdb.api.token=${TMDB_API_TOKEN}
postgres.password=${POSTGRES_PASSWORD}

# Custom Application Properties
db.url=jdbc:postgresql://localhost:5432/media_rater
db.driver=org.postgresql.Driver
db.user=postgres
db.password=${POSTGRES_PASSWORD}